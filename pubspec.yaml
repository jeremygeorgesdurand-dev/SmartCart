name: smartcart
description: Application de liste de courses intelligente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path: ^1.9.0
  speech_to_text: ^7.0.0
  http: ^1.1.2
  mobile_scanner: ^6.0.0
  share_plus: ^10.0.0
  uuid: ^4.2.2
  cupertino_icons: ^1.0.2
  flutter_native_splash: ^2.4.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  firebase_crashlytics: ^4.3.10
  firebase_app_check: ^0.3.2+10
  firebase_messaging: ^15.2.10
  pdf: ^3.13.0
  printing: ^5.15.0
  file_picker: ^11.0.2
  path_provider: ^2.1.6
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.2
  sqflite_common_ffi: ^2.4.2

# Icône sans adaptive = image affichée telle quelle, pas de fond coloré
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0d6857"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_foreground_inset: 16
  override_android_min_sdk_version: true

flutter_native_splash:
  color: "#0d6857"
  image: assets/splash_logo.png
  android_12:
    color: "#0d6857"
    image: assets/splash_logo.png
    icon_background_color: "#0d6857"

flutter:
  uses-material-design: true
  assets:
    - assets/
